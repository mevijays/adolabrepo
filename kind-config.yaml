kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraPortMappings:
    # Istio Ingress Gateway (Main Apps)
    - containerPort: 30080
      hostPort: 80
      protocol: TCP
    - containerPort: 30443
      hostPort: 443
      protocol: TCP
    # ArgoCD Dedicated Port
    - containerPort: 30007
      hostPort: 8080
      protocol: TCP